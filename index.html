<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Ranking System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-controls {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            background-color: #2563eb;
        }

        .tier-list {
            width: 100%;
            max-width: 900px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .tier-row {
            display: flex;
            border-bottom: 2px solid #333;
            min-height: 120px;
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            width: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: #121212;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.4);
            transition: background-color 0.3s ease;
        }

        .tier-content {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            padding: 15px;
            gap: 15px;
            background-color: #1e1e1e;
            transition: background-color 0.2s;
        }

        .unranked-container {
            width: 100%;
            max-width: 900px;
            margin-top: 40px;
        }

        .unranked-container h3 {
            margin-bottom: 15px;
            color: #9ca3af;
            font-weight: 500;
        }

        .unranked-zone {
            min-height: 180px;
            background-color: #1e1e1e;
            border: 2px dashed #4b5563;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .draggable-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            cursor: grab;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }

        .draggable-img:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        .dropzone.dragover {
            background-color: #2a2a2a;
        }
        
        .unranked-zone.dragover {
            background-color: #2a2a2a;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="header-controls">
        <h1>Tier List Ranker</h1>
        <button id="styleToggle">Switch Ranking Style</button>
    </div>

    <div class="tier-list">
        <div class="tier-row">
            <div class="tier-label" id="label1"></div>
            <div class="tier-content dropzone" id="tier1"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label" id="label2"></div>
            <div class="tier-content dropzone" id="tier2"></div>
        </div>
        <div class="tier-row">
            <div class="tier-label" id="label3"></div>
            <div class="tier-content dropzone" id="tier3"></div>
        </div>
    </div>

    <div class="unranked-container">
        <h3>Paste Images anywhere (Ctrl+V / Cmd+V) or Drag them back here:</h3>
        <div class="unranked-zone dropzone" id="unrankedZone"></div>
    </div>

    <script>
        // --- 1. Ranking Styles Configuration ---
        const rankingStyles = [
            { // Style 1: Standard
                labels: ['S Tier', 'A Tier', 'B Tier'],
                colors: ['#ef4444', '#f97316', '#eab308'] // Red, Orange, Yellow
            },
            { // Style 2: Medals
                labels: ['Gold', 'Silver', 'Bronze'],
                colors: ['#fbbf24', '#9ca3af', '#b45309'] // Gold, Silver, Bronze
            },
            { // Style 3: Descriptive
                labels: ['Top Tier', 'Mid Tier', 'Low Tier'],
                colors: ['#22c55e', '#3b82f6', '#a855f7'] // Green, Blue, Purple
            }
        ];

        let currentStyleIndex = 0;

        function applyStyle(index) {
            const style = rankingStyles[index];
            for (let i = 1; i <= 3; i++) {
                const labelElement = document.getElementById(`label${i}`);
                labelElement.innerText = style.labels[i - 1];
                labelElement.style.backgroundColor = style.colors[i - 1];
            }
        }

        // Initialize default style
        applyStyle(currentStyleIndex);

        // Toggle button logic
        document.getElementById('styleToggle').addEventListener('click', () => {
            currentStyleIndex = (currentStyleIndex + 1) % rankingStyles.length;
            applyStyle(currentStyleIndex);
        });


        // --- 2. Image Pasting Logic ---
        document.addEventListener('paste', (e) => {
            const files = e.clipboardData.files;
            if (files.length === 0) return;

            for (let i = 0; i < files.length; i++) {
                // Check if the pasted file is an image
                if (files[i].type.indexOf('image') !== -1) {
                    const blob = files[i];
                    const imageUrl = URL.createObjectURL(blob);
                    createDraggableImage(imageUrl);
                }
            }
        });

        function createDraggableImage(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'draggable-img';
            img.draggable = true;
            img.id = 'img-' + Date.now() + '-' + Math.floor(Math.random() * 1000); // Unique ID
            
            // Add drag event listener to the new image
            img.addEventListener('dragstart', dragStart);
            
            // Append to the unranked zone
            document.getElementById('unrankedZone').appendChild(img);
        }


        // --- 3. Drag and Drop Logic ---
        let draggedElementId = null;

        function dragStart(e) {
            draggedElementId = e.target.id;
            e.dataTransfer.setData('text/plain', e.target.id);
            e.dataTransfer.effectAllowed = "move";
        }

        const dropzones = document.querySelectorAll('.dropzone');

        dropzones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); // Necessary to allow dropping
                e.dataTransfer.dropEffect = "move";
                zone.classList.add('dragover');
            });

            zone.addEventListener('dragleave', (e) => {
                zone.classList.remove('dragover');
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                
                const id = e.dataTransfer.getData('text/plain');
                const draggableElement = document.getElementById(id);
                
                if (draggableElement) {
                    zone.appendChild(draggableElement);
                }
            });
        });
    </script>
</body>
</html>
